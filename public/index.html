
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>TikTok Views Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            color: white; 
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; text-align: center; }
        h1 { 
            font-size: 3em; 
            margin: 30px 0; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        .subtitle { font-size: 1.3em; margin-bottom: 40px; opacity: 0.9; }
        .packages { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            margin: 50px 0; 
        }
        .package { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
            padding: 40px 20px; 
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .package:hover { transform: translateY(-10px); }
        .package h3 { font-size: 1.6em; margin-bottom: 15px; }
        .price { 
            font-size: 3.5em; 
            font-weight: bold; 
            background: linear-gradient(45deg, #ff6b6b, #feca57); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 20px 0; 
        }
        .buy-btn { 
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e); 
            color: white; 
            border: none; 
            padding: 18px 40px; 
            border-radius: 50px; 
            font-size: 1.2em; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s; 
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }
        .buy-btn:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(255,107,107,0.6); }
        
        #orderForm { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 40px; 
            max-width: 500px; 
            margin: 40px auto; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            display: none; 
            color: #333;
        }
        .form-group { margin-bottom: 25px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 1.1em; }
        .form-group input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-size: 16px; 
            transition: all 0.3s; 
        }
        .form-group input:focus { outline: none; border-color: #ff6b6b; transform: scale(1.02); }
        .pay-btn { 
            width: 100%; 
            background: linear-gradient(45deg, #32cd32, #90ee90); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 15px; 
            font-size: 1.4em; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px;
        }
        @media (max-width: 768px) { 
            h1 { font-size: 2em; } 
            .packages { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 TikTok Views Shop</h1>
        <p class="subtitle">مشاهدات تيك توك فورية ✅ تسليم خلال 5 دقائق</p>
        
        <div class="packages">
            <div class="package">
                <h3>1000 مشاهدة</h3>
                <div class="price">$5</div>
                <button class="buy-btn" onclick="openOrder(1000, 5)">اشتري الآن</button>
            </div>
            <div class="package">
                <h3>10,000 مشاهدة</h3>
                <div class="price">$25</div>
                <button class="buy-btn" onclick="openOrder(10000, 25)">اشتري الآن</button>
            </div>
            <div class="package">
                <h3>50,000 مشاهدة</h3>
                <div class="price">$75</div>
                <button class="buy-btn" onclick="openOrder(50000, 75)">اشتري الآن</button>
            </div>
        </div>
        
        <div id="orderForm">
            <h2>🛒 تأكيد الطلب</h2>
            <div class="form-group">
                <label>رابط الفيديو تيك توك:</label>
                <input type="url" id="videoLink" placeholder="https://vm.tiktok.com/xxxxxxxxx">
            </div>
            <div class="form-group">
                <label>عدد المشاهدات:</label>
                <input type="text" id="showViews" readonly>
            </div>
            <div class="form-group">
                <label>السعر الإجمالي:</label>
                <input type="text" id="showPrice" readonly style="font-size: 1.5em; color: #32cd32;">
            </div>
            <button class="pay-btn" onclick="placeOrder()">💳 أكد الدفع والطلب</button>
            <button onclick="closeOrder()" style="background: #6c757d; margin-top: 10px; padding: 15px;">إلغاء</button>
        </div>
    </div>

    <script>
        let selectedViews = 0;
        let selectedPrice = 0;

        function openOrder(views, price) {
            selectedViews = views;
            selectedPrice = price;
            document.getElementById('showViews').value = views.toLocaleString() + ' مشاهدة';
            document.getElementById('showPrice').value = '$' + price;
            document.getElementById('orderForm').style.display = 'block';
            document.getElementById('videoLink').focus();
        }

        function closeOrder() {
            document.getElementById('orderForm').style.display = 'none';
        }

        function placeOrder() {
            const videoUrl = document.getElementById('videoLink').value;
            if (!videoUrl) {
                alert('❌ أدخل رابط الفيديو أولاً!');
                return;
            }

            fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    videoUrl: videoUrl,
                    views: selectedViews,
                    price: selectedPrice
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('✅ تم تسجيل الطلب بنجاح!\n💰 السعر: $' + selectedPrice + '\n📊 افتح لوحة التحكم: http://localhost:3000/admin');
                    closeOrder();
                } else {
                    alert('❌ خطأ في الطلب!');
                }
            })
            .catch(error => {
                alert('❌ خطأ: ' + error);
            });
        }
    </script>
</body>
</html>
